# CI for Arch Silverblue. Mirrors the Makefile targets:
#   * test      -> `make test`      (shellcheck + bats + systemd-analyze verify)  — fast, required
#   * build-iso -> `make build-iso` (privileged Docker + mkarchiso)               — main/tags only
#   * qemu      -> `make test-qemu` (full boot in QEMU)                           — manual only
#
# shellcheck/bats come from `nix shell` (as documented for local dev), so CI installs Nix and
# runs the same `make` targets a contributor runs — no separate tool list to drift.
name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

# One in-flight run per ref; cancel superseded ones (e.g. force-pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: lint + unit + verify-units
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix (provides shellcheck + bats)
        uses: DeterminateSystems/nix-installer-action@main
      - name: make test
        run: make test

  build-iso:
    name: build ISO + checksums
    runs-on: ubuntu-latest
    # The ISO build is expensive (privileged Docker + a full pacman download), so keep it off
    # every PR; build on pushes to main, on tags, and on demand. ubuntu-latest ships Docker and
    # allows --privileged, which mkarchiso needs.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
       (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')))
    steps:
      - uses: actions/checkout@v4
      - name: make build-iso
        run: make build-iso
      - name: Upload ISO + SHA256SUMS
        uses: actions/upload-artifact@v4
        with:
          name: iso
          path: |
            iso/output/*.iso
            iso/output/SHA256SUMS
          if-no-files-found: error

  qemu:
    name: QEMU integration (manual)
    runs-on: ubuntu-latest
    # GitHub-hosted runners have no /dev/kvm, so the harness falls back to TCG emulation, which
    # full-boots an Arch ISO and is far too slow for every push. Run it on demand only.
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Install QEMU + OVMF firmware
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-system-x86 ovmf
      - name: make test-qemu
        run: make test-qemu  # builds the ISO first via its Makefile prerequisite
